<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="apple-mobile-web-app-title" content="AnimeLast" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>AnimeLast</title>
  
  <!-- Resource Hints for Speed -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
</head>

<body>
  <div id="root"></div>
  <!-- ═══════════════════════════════════════════════════════════════
       GLOBAL POPUP / AD BLOCKER — runs before ALL other scripts
       Blocks window.open, _blank links, and ad redirects site-wide
  ════════════════════════════════════════════════════════════════ -->
  <script>
    (function () {
      'use strict';

      // 1. Hard-seal window.open — non-configurable, non-writable
      try {
        Object.defineProperty(window, 'open', {
          value: function () { return null; },
          writable: false,
          configurable: false,
        });
      } catch (e) {
        window.open = function () { return null; };
      }

      // 2. Silence modal dialogs used by ad scripts
      window.alert   = function () {};
      window.confirm = function () { return false; };
      window.prompt  = function () { return null; };

      // 3. Intercept ALL clicks — block any _blank / _top / _parent navigation
      document.addEventListener('click', function (e) {
        var el = e.target;
        for (var i = 0; i < 10 && el && el !== document; i++) {
          if (el.tagName === 'A') {
            var target = (el.getAttribute('target') || '').toLowerCase();
            if (target === '_blank' || target === '_new' ||
                target === '_top'   || target === '_parent') {
              e.preventDefault();
              e.stopImmediatePropagation();
              return;
            }
          }
          el = el.parentElement;
        }
      }, true);

      // 4. Block window.open on any iframe that gets added to the page
      var frameGuard = new MutationObserver(function (mutations) {
        mutations.forEach(function (m) {
          m.addedNodes.forEach(function (node) {
            if (node.tagName === 'IFRAME') {
              try {
                node.addEventListener('load', function () {
                  try {
                    node.contentWindow.open    = function () { return null; };
                    node.contentWindow.alert   = function () {};
                    node.contentWindow.confirm = function () { return false; };
                    node.contentWindow.prompt  = function () { return null; };
                  } catch (ex) {}
                });
              } catch (ex) {}
            }
          });
        });
      });
      frameGuard.observe(document.documentElement, { childList: true, subtree: true });

      // 5. Focus guardian — if a popup steals focus, reclaim it immediately
      window.addEventListener('blur', function () {
        setTimeout(function () { try { window.focus(); } catch (e) {} }, 50);
      });

    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
